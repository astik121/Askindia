<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Nova AI">
<meta name="theme-color" content="#7c5cfc">
<meta name="description" content="AI Chatbot aur Image Generator — powered by Claude">
<link rel="manifest" href="/manifest.json" crossorigin="use-credentials">
<link rel="apple-touch-icon" href="icons/icon-192x192.svg">
<title>Nova AI — Chat & Imagine</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1c1c28;
    --border: #2a2a3d;
    --accent: #7c5cfc;
    --accent2: #fc5c8a;
    --accent3: #5cf4fc;
    --text: #e8e8f0;
    --muted: #6b6b8a;
    --glow: rgba(124,92,252,0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Animated background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 10%, rgba(124,92,252,0.08) 0%, transparent 60%),
      radial-gradient(ellipse 40% 30% at 80% 80%, rgba(252,92,138,0.06) 0%, transparent 60%),
      radial-gradient(ellipse 50% 50% at 50% 50%, rgba(92,244,252,0.03) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* Header */
  header {
    position: relative;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    background: rgba(10,10,15,0.8);
    backdrop-filter: blur(20px);
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 22px;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: -0.5px;
  }

  .logo span {
    font-weight: 400;
    font-size: 13px;
    -webkit-text-fill-color: var(--muted);
    margin-left: 8px;
    font-family: 'DM Sans', sans-serif;
  }

  /* Mode toggle */
  .mode-toggle {
    display: flex;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 4px;
    gap: 4px;
  }

  .mode-btn {
    padding: 8px 18px;
    border-radius: 8px;
    border: none;
    background: transparent;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .mode-btn.active {
    background: var(--accent);
    color: white;
    box-shadow: 0 0 20px rgba(124,92,252,0.3);
  }

  .mode-btn:hover:not(.active) {
    color: var(--text);
    background: var(--surface2);
  }

  /* Main layout */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    position: relative;
    z-index: 1;
    overflow: hidden;
  }

  /* Chat area */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
  }

  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* Welcome */
  .welcome {
    text-align: center;
    padding: 60px 20px;
    animation: fadeUp 0.6s ease;
  }

  .welcome-icon {
    width: 72px;
    height: 72px;
    margin: 0 auto 20px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    box-shadow: 0 0 40px rgba(124,92,252,0.3);
  }

  .welcome h2 {
    font-family: 'Syne', sans-serif;
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 10px;
    background: linear-gradient(135deg, var(--text), var(--muted));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .welcome p {
    color: var(--muted);
    font-size: 15px;
    line-height: 1.6;
    max-width: 380px;
    margin: 0 auto 28px;
  }

  .suggestions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
  }

  .suggestion {
    padding: 8px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--text);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
  }

  .suggestion:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--glow);
  }

  /* Message bubbles */
  .msg {
    display: flex;
    gap: 12px;
    animation: fadeUp 0.3s ease;
    max-width: 760px;
  }

  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg.ai { align-self: flex-start; }

  .msg-avatar {
    width: 36px;
    height: 36px;
    border-radius: 12px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
  }

  .msg.ai .msg-avatar {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
  }

  .msg.user .msg-avatar {
    background: var(--surface2);
    border: 1px solid var(--border);
  }

  .msg-bubble {
    padding: 12px 16px;
    border-radius: 16px;
    max-width: 620px;
    line-height: 1.65;
    font-size: 15px;
  }

  .msg.ai .msg-bubble {
    background: var(--surface);
    border: 1px solid var(--border);
    border-top-left-radius: 4px;
  }

  .msg.user .msg-bubble {
    background: var(--accent);
    border-top-right-radius: 4px;
    color: white;
  }

  /* Image result */
  .img-result {
    margin-top: 10px;
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid var(--border);
  }

  .img-result img {
    width: 100%;
    max-width: 400px;
    display: block;
    border-radius: 12px;
  }

  .img-placeholder {
    width: 340px;
    height: 240px;
    background: linear-gradient(135deg, var(--surface2), var(--surface));
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    border: 1px dashed var(--border);
  }

  .img-placeholder .spinner {
    width: 32px;
    height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  /* Loading dots */
  .typing {
    display: flex;
    gap: 5px;
    align-items: center;
    padding: 4px 0;
  }

  .typing span {
    width: 7px;
    height: 7px;
    background: var(--muted);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }

  .typing span:nth-child(2) { animation-delay: 0.15s; }
  .typing span:nth-child(3) { animation-delay: 0.3s; }

  /* Input area */
  .input-area {
    padding: 16px 24px 20px;
    border-top: 1px solid var(--border);
    background: rgba(10,10,15,0.9);
    backdrop-filter: blur(20px);
  }

  .input-box {
    display: flex;
    align-items: flex-end;
    gap: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 12px 16px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .input-box:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(124,92,252,0.1);
  }

  textarea {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    resize: none;
    max-height: 120px;
    min-height: 24px;
    line-height: 1.5;
  }

  textarea::placeholder { color: var(--muted); }

  .send-btn {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    border: none;
    background: var(--accent);
    color: white;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
    font-size: 18px;
  }

  .send-btn:hover { background: #9070ff; transform: scale(1.05); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .input-hint {
    font-size: 12px;
    color: var(--muted);
    margin-top: 8px;
    text-align: center;
  }

  /* Mode indicator */
  .mode-indicator {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .mode-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
  }

  /* Image panel */
  .image-panel {
    display: none;
    flex: 1;
    overflow-y: auto;
    padding: 24px;
  }

  .image-panel.active { display: block; }
  .messages.hidden { display: none; }

  .img-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
    margin-top: 16px;
  }

  .img-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    animation: fadeUp 0.4s ease;
  }

  .img-card img {
    width: 100%;
    height: 200px;
    object-fit: cover;
    display: block;
  }

  .img-card-info {
    padding: 12px;
  }

  .img-card-prompt {
    font-size: 13px;
    color: var(--muted);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* Animations */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-6px); }
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  /* Error */
  .error-msg {
    color: var(--accent2);
    font-size: 13px;
    padding: 8px 12px;
    background: rgba(252,92,138,0.08);
    border-radius: 8px;
    border: 1px solid rgba(252,92,138,0.2);
    margin-top: 6px;
  }
</style>
</head>
<body>

<header>
  <div class="logo">Nova AI <span>powered by Claude</span></div>
  <div class="mode-toggle">
    <button class="mode-btn active" id="chatModeBtn" onclick="setMode('chat')">💬 Chat</button>
    <button class="mode-btn" id="imgModeBtn" onclick="setMode('image')">🎨 Imagine</button>
  </div>
</header>

<div class="main">
  <!-- Chat -->
  <div class="messages" id="messages">
    <div class="welcome" id="welcomeScreen">
      <div class="welcome-icon">✨</div>
      <h2>Namaste! Main Nova hoon</h2>
      <p>Aapka AI assistant — kuch bhi poochein ya koi image banwayein. Main yahan hoon!</p>
      <div class="suggestions">
        <div class="suggestion" onclick="quickSend('Aaj ka weather kaisa hai?')">🌤 Weather</div>
        <div class="suggestion" onclick="quickSend('Mujhe Python seekhni hai, kahan se shuru karoon?')">💻 Coding</div>
        <div class="suggestion" onclick="quickSend('Ek funny joke sunao')">😂 Joke</div>
        <div class="suggestion" onclick="quickSend('Healthy breakfast recipes batao')">🥗 Recipes</div>
        <div class="suggestion" onclick="switchToImage('a beautiful sunset over mountains')">🌅 Sunset Image</div>
        <div class="suggestion" onclick="switchToImage('futuristic city at night')">🌃 Futuristic City</div>
      </div>
    </div>
  </div>

  <!-- Image Panel -->
  <div class="image-panel" id="imagePanel">
    <div id="imgGallery"></div>
  </div>
</div>

<!-- Input -->
<div class="input-area">
  <div class="mode-indicator">
    <div class="mode-dot" id="modeDot"></div>
    <span id="modeHint">Chat mode — kuch bhi poochein</span>
  </div>
  <div class="input-box">
    <textarea id="msgInput" placeholder="Kuch poochein ya image describe karein..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="handleSend()">➤</button>
  </div>
  <div class="input-hint">Enter to send • Shift+Enter for new line</div>
</div>

<script>
  let mode = 'chat';
  let chatHistory = [];
  const CLAUDE_MODEL = "claude-sonnet-4-20250514";

  function setMode(m) {
    mode = m;
    document.getElementById('chatModeBtn').classList.toggle('active', m === 'chat');
    document.getElementById('imgModeBtn').classList.toggle('active', m === 'image');
    document.getElementById('messages').classList.toggle('hidden', m === 'image');
    document.getElementById('imagePanel').classList.toggle('active', m === 'image');

    if (m === 'image') {
      document.getElementById('modeHint').textContent = 'Image mode — koi bhi scene describe karein';
      document.getElementById('modeDot').style.background = '#fc5c8a';
      document.getElementById('msgInput').placeholder = 'Image describe karein, jaise: "a dragon flying over mountains"';
    } else {
      document.getElementById('modeHint').textContent = 'Chat mode — kuch bhi poochein';
      document.getElementById('modeDot').style.background = '#7c5cfc';
      document.getElementById('msgInput').placeholder = 'Kuch poochein ya image describe karein...';
    }
  }

  function switchToImage(prompt) {
    setMode('image');
    document.getElementById('msgInput').value = prompt;
    handleSend();
  }

  function quickSend(text) {
    document.getElementById('msgInput').value = text;
    handleSend();
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      handleSend();
    }
  }

  async function handleSend() {
    const input = document.getElementById('msgInput');
    const text = input.value.trim();
    if (!text) return;
    input.value = '';
    autoResize(input);
    document.getElementById('sendBtn').disabled = true;

    if (mode === 'chat') {
      await sendChat(text);
    } else {
      await generateImage(text);
    }

    document.getElementById('sendBtn').disabled = false;
    input.focus();
  }

  function addMsg(role, content, isHTML = false) {
    const welcome = document.getElementById('welcomeScreen');
    if (welcome) welcome.remove();

    const msgs = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = `msg ${role}`;

    const avatar = role === 'ai' ? '✨' : '👤';
    div.innerHTML = `
      <div class="msg-avatar">${avatar}</div>
      <div class="msg-bubble">${isHTML ? content : escapeHtml(content)}</div>
    `;
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
    return div;
  }

  function escapeHtml(text) {
    return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
               .replace(/\n/g, '<br>');
  }

  async function sendChat(text) {
    addMsg('user', text);
    chatHistory.push({ role: 'user', content: text });

    // Loading
    const loadDiv = document.createElement('div');
    loadDiv.className = 'msg ai';
    loadDiv.innerHTML = `
      <div class="msg-avatar">✨</div>
      <div class="msg-bubble"><div class="typing"><span></span><span></span><span></span></div></div>
    `;
    document.getElementById('messages').appendChild(loadDiv);
    document.getElementById('messages').scrollTop = 99999;

    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: CLAUDE_MODEL,
          max_tokens: 1000,
          system: `Aap Nova hain — ek helpful, friendly AI assistant. Aap Hinglish mein baat kar sakte hain (Hindi + English mix). Concise aur helpful responses dein. Markdown use kar sakte hain lekin sirf zaroorat ho to. Emojis occasionally use karein for a friendly tone.`,
          messages: chatHistory
        })
      });

      const data = await res.json();
      loadDiv.remove();

      if (data.error) throw new Error(data.error.message);

      const reply = data.content?.map(b => b.text || '').join('') || 'Koi response nahi mili.';
      chatHistory.push({ role: 'assistant', content: reply });
      addMsg('ai', reply);

    } catch (err) {
      loadDiv.remove();
      addMsg('ai', `<div class="error-msg">⚠️ Error: ${err.message}</div>`, true);
    }
  }

  async function generateImage(prompt) {
    const gallery = document.getElementById('imgGallery');
    
    // Show loading card
    const card = document.createElement('div');
    card.className = 'img-card';
    card.innerHTML = `
      <div class="img-placeholder">
        <div class="spinner"></div>
        <div style="color: var(--muted); font-size: 13px;">Generating...</div>
        <div style="color: var(--muted); font-size: 12px; max-width: 200px; text-align: center; opacity: 0.7">"${prompt.slice(0,50)}${prompt.length>50?'...':''}"</div>
      </div>
      <div class="img-card-info"><div class="img-card-prompt">${escapeHtml(prompt)}</div></div>
    `;
    gallery.prepend(card);

    try {
      // Use Claude to get a Pollinations URL
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: CLAUDE_MODEL,
          max_tokens: 200,
          system: `You generate image URLs using Pollinations.ai. Given a prompt, return ONLY the URL in this exact format: https://image.pollinations.ai/prompt/{encoded_prompt}?width=512&height=512&nologo=true
Encode the prompt for URL (replace spaces with %20, etc.). Return ONLY the URL, nothing else.`,
          messages: [{ role: 'user', content: `Generate URL for: ${prompt}` }]
        })
      });

      const data = await res.json();
      let imageUrl = data.content?.map(b => b.text || '').join('').trim();
      
      // Fallback: build URL directly
      if (!imageUrl || !imageUrl.startsWith('http')) {
        imageUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?width=512&height=512&nologo=true`;
      }

      // Load image
      const img = new Image();
      img.onload = () => {
        card.innerHTML = `
          <img src="${imageUrl}" alt="${escapeHtml(prompt)}" />
          <div class="img-card-info"><div class="img-card-prompt">🎨 ${escapeHtml(prompt)}</div></div>
        `;
      };
      img.onerror = () => {
        // If pollinations fails, show a styled placeholder with prompt
        card.innerHTML = `
          <div class="img-placeholder" style="height:180px">
            <div style="font-size:40px">🎨</div>
            <div style="color:var(--text); font-size:13px; text-align:center; padding:0 16px">"${escapeHtml(prompt)}"</div>
            <div style="color:var(--muted); font-size:11px">Image service unavailable</div>
          </div>
          <div class="img-card-info"><div class="img-card-prompt">${escapeHtml(prompt)}</div></div>
        `;
      };
      img.src = imageUrl;

    } catch (err) {
      card.innerHTML = `
        <div class="img-placeholder" style="height:120px">
          <div class="error-msg">⚠️ ${err.message}</div>
        </div>
        <div class="img-card-info"><div class="img-card-prompt">${escapeHtml(prompt)}</div></div>
      `;
    }
  }


  // Register Service Worker
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js')
        .then(() => console.log('Nova AI: SW registered ✅'))
        .catch(err => console.log('SW error:', err));
    });
  }

  // PWA Install prompt
  let deferredPrompt;
  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredPrompt = e;
    const banner = document.createElement('div');
    banner.id = 'installBanner';
    banner.style.cssText = `position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--accent);border-radius:12px;padding:10px 16px;z-index:999;display:flex;align-items:center;gap:10px;font-size:13px;box-shadow:0 0 20px rgba(124,92,252,0.2);white-space:nowrap;`;
    banner.innerHTML = `<span>📲 App install karein?</span><button onclick="installApp()" style="background:var(--accent);color:white;border:none;padding:5px 12px;border-radius:6px;cursor:pointer;font-size:12px;font-family:inherit">Install</button><button onclick="this.parentElement.remove()" style="background:transparent;color:var(--muted);border:none;cursor:pointer;font-size:16px">✕</button>`;
    document.body.appendChild(banner);
  });

  function installApp() {
    if (deferredPrompt) {
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then(() => { deferredPrompt = null; document.getElementById('installBanner')?.remove(); });
    }
  }
</script>
</body>
</html>
