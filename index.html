<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#7c5cfc">
<title>Ask India</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:sans-serif;background:#0a0a0f;color:#e8e8f0;height:100vh;display:flex;flex-direction:column}
header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:#12121a;border-bottom:1px solid #2a2a3d}
.logo{font-weight:800;font-size:20px;background:linear-gradient(135deg,#7c5cfc,#fc5c8a);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.tabs{display:flex;background:#0a0a0f;border:1px solid #2a2a3d;border-radius:10px;padding:3px;gap:3px}
.tab{padding:7px 14px;border-radius:7px;border:none;background:transparent;color:#6b6b8a;font-size:13px;cursor:pointer}
.tab.active{background:#7c5cfc;color:white}
.main{flex:1;overflow:hidden;display:flex;flex-direction:column}
#chatPanel{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
#imgPanel{flex:1;overflow-y:auto;padding:16px;display:none}
.welcome{text-align:center;padding:40px 16px}
.welcome h2{font-size:22px;margin-bottom:8px;color:#e8e8f0}
.welcome p{color:#6b6b8a;font-size:14px;margin-bottom:20px}
.chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
.chip{padding:7px 14px;background:#12121a;border:1px solid #2a2a3d;border-radius:20px;color:#e8e8f0;font-size:12px;cursor:pointer}
.msg{display:flex;gap:8px;max-width:100%}
.msg.user{flex-direction:row-reverse;align-self:flex-end}
.msg.ai{align-self:flex-start}
.bubble{padding:10px 14px;border-radius:14px;max-width:80vw;font-size:14px;line-height:1.6}
.msg.ai .bubble{background:#12121a;border:1px solid #2a2a3d}
.msg.user .bubble{background:#7c5cfc;color:white}
.av{width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.msg.ai .av{background:linear-gradient(135deg,#7c5cfc,#fc5c8a)}
.msg.user .av{background:#1c1c28;border:1px solid #2a2a3d}
.dots{display:flex;gap:4px;padding:2px 0}
.dots span{width:6px;height:6px;background:#6b6b8a;border-radius:50%;animation:bounce 1.2s infinite}
.dots span:nth-child(2){animation-delay:.15s}
.dots span:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
.img-card{background:#12121a;border:1px solid #2a2a3d;border-radius:12px;overflow:hidden;margin-bottom:12px}
.img-card img{width:100%;display:block}
.img-caption{padding:8px 12px;font-size:12px;color:#6b6b8a}
.img-loading{height:160px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px}
.spinner{width:28px;height:28px;border:3px solid #2a2a3d;border-top-color:#7c5cfc;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.input-area{padding:12px 16px 16px;background:#0a0a0f;border-top:1px solid #2a2a3d}
.input-row{display:flex;gap:10px;align-items:flex-end;background:#12121a;border:1px solid #2a2a3d;border-radius:14px;padding:10px 14px}
textarea{flex:1;background:transparent;border:none;outline:none;color:#e8e8f0;font-size:14px;resize:none;max-height:100px;min-height:20px;line-height:1.5}
textarea::placeholder{color:#6b6b8a}
.send{width:36px;height:36px;border-radius:8px;border:none;background:#7c5cfc;color:white;font-size:16px;cursor:pointer;flex-shrink:0}
.send:disabled{opacity:.4}
.err{color:#fc5c8a;font-size:13px;padding:6px 10px;background:rgba(252,92,138,.08);border-radius:8px;border:1px solid rgba(252,92,138,.2)}
</style>
</head>
<body>
<header>
  <div class="logo">Ask India</div>
  <div class="tabs">
    <button class="tab active" onclick="setMode('chat')">💬 Chat</button>
    <button class="tab" onclick="setMode('img')">🎨 Image</button>
  </div>
</header>
<div class="main">
  <div id="chatPanel">
    <div class="welcome" id="welcome">
      <h2>Namaste! 🙏</h2>
      <p>Kuch bhi poochein — main yahan hoon!</p>
      <div class="chips">
        <div class="chip" onclick="qs('Ek funny joke sunao')">😂 Joke</div>
        <div class="chip" onclick="qs('Motivational quote do')">💪 Motivation</div>
        <div class="chip" onclick="qs('Python kaise seekhein?')">💻 Coding</div>
        <div class="chip" onclick="qs('Healthy food tips batao')">🥗 Health</div>
        <div class="chip" onclick="si('beautiful sunset over mountains')">🌅 Sunset</div>
        <div class="chip" onclick="si('futuristic India city')">🌆 Future India</div>
      </div>
    </div>
  </div>
  <div id="imgPanel"></div>
</div>
<div class="input-area">
  <div class="input-row">
    <textarea id="inp" placeholder="Poochein ya image describe karein..." rows="1" oninput="ar(this)" onkeydown="hk(event)"></textarea>
    <button class="send" id="btn" onclick="send()">➤</button>
  </div>
</div>
<script>
let mode='chat',hist=[];
const KEY="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";
const URL="https://openrouter.ai/api/v1/chat/completions";
const MODEL="meta-llama/llama-3.3-70b-instruct:free";

function setMode(m){
  mode=m;
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',(m==='chat'&&i===0)||(m==='img'&&i===1)));
  document.getElementById('chatPanel').style.display=m==='chat'?'flex':'none';
  document.getElementById('imgPanel').style.display=m==='img'?'block':'none';
  document.getElementById('inp').placeholder=m==='chat'?'Poochein...':'Image describe karein...';
}
function qs(t){document.getElementById('inp').value=t;send();}
function si(t){setMode('img');document.getElementById('inp').value=t;send();}
function ar(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,100)+'px';}
function hk(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}}
function rmW(){const w=document.getElementById('welcome');if(w)w.remove();}

function addMsg(role,html){
  rmW();
  const p=document.getElementById('chatPanel');
  const d=document.createElement('div');
  d.className='msg '+role;
  d.innerHTML=`<div class="av">${role==='ai'?'🤖':'👤'}</div><div class="bubble">${html}</div>`;
  p.appendChild(d);
  p.scrollTop=p.scrollHeight;
  return d;
}
function esc(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');}

async function send(){
  const inp=document.getElementById('inp');
  const t=inp.value.trim();
  if(!t)return;
  inp.value='';ar(inp);
  document.getElementById('btn').disabled=true;
  mode==='chat'?await chat(t):await genImg(t);
  document.getElementById('btn').disabled=false;
}

async function chat(text){
  addMsg('user',esc(text));
  hist.push({role:'user',content:text});
  const ld=addMsg('ai','<div class="dots"><span></span><span></span><span></span></div>');
  try{
    const r=await fetch(URL,{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'Authorization':'Bearer '+KEY,
        'HTTP-Referer':'https://astik121.github.io',
        'X-Title':'Ask India'
      },
      body:JSON.stringify({
        model:MODEL,
        max_tokens:1000,
        messages:[
          {role:'system',content:'Aap Ask India hain — ek helpful Hindi/Hinglish AI assistant. Short, friendly aur helpful responses dein. Emojis use karein.'},
          ...hist
        ]
      })
    });
    const d=await r.json();
    ld.remove();
    if(d.error)throw new Error(d.error.message);
    const rep=d.choices?.[0]?.message?.content||'Jawab nahi mila.';
    hist.push({role:'assistant',content:rep});
    addMsg('ai',esc(rep));
  }catch(e){ld.remove();addMsg('ai',`<div class="err">⚠️ ${e.message}</div>`);}
}

async function genImg(prompt){
  rmW();
  const panel=document.getElementById('imgPanel');
  const card=document.createElement('div');
  card.className='img-card';
  card.innerHTML=`<div class="img-loading"><div class="spinner"></div><div style="color:#6b6b8a;font-size:13px">Bana raha hoon...</div></div><div class="img-caption">${esc(prompt)}</div>`;
  panel.prepend(card);
  const url=`https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?width=512&height=512&nologo=true`;
  const img=new Image();
  img.onload=()=>{card.innerHTML=`<img src="${url}"/><div class="img-caption">🎨 ${esc(prompt)}</div>`;};
  img.onerror=()=>{card.innerHTML=`<div class="img-loading"><div style="font-size:36px">🎨</div><div style="color:#6b6b8a;font-size:12px">Service unavailable</div></div><div class="img-caption">${esc(prompt)}</div>`;};
  img.src=url;
}
</script>
</body>
</html>
